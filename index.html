<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Game Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  overflow-x: hidden;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000428);
  background-size: 400% 400%;
  animation: galaxyBG 15s ease infinite;
  color: white;
}

/* Animated galaxy background */
@keyframes galaxyBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Floating binary effect */
.binary {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.binary span {
  position: absolute;
  color: rgba(0,255,170,0.15);
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-100vh); }
  to { transform: translateY(100vh); }
}

/* Main content */
header {
  text-align: center;
  padding: 40px 20px;
  z-index: 1;
  position: relative;
}

header h1 {
  font-size: 3rem;
  letter-spacing: 2px;
  text-shadow: 0 0 15px #00ffaa;
}

header p {
  opacity: 0.8;
  margin-top: 10px;
}

.container {
  position: relative;
  z-index: 1;
  width: 85%;
  margin: auto;
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 0 30px rgba(0,255,170,0.2);
}

/* 3-column grid */
.games-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

/* Neon buttons */
.game-btn {
  padding: 25px;
  text-align: center;
  text-decoration: none;
  font-weight: bold;
  font-size: 1.2rem;
  border-radius: 15px;
  background: rgba(0, 255, 170, 0.1);
  border: 1px solid rgba(0,255,170,0.4);
  color: #00ffaa;
  transition: 0.3s ease;
}

.game-btn:hover {
  background: #00ffaa;
  color: #000;
  box-shadow: 0 0 20px #00ffaa, 0 0 40px #00ffaa;
  transform: translateY(-5px);
}

footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
  font-size: 0.9rem;
}

/* Responsive */
@media (max-width: 900px) {
  .games-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .games-grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>
<body>

<!-- Binary Background -->
<div class="binary" id="binary"></div>

<header>
  <h1>🌌 Galaxy Game Hub</h1>
  <p>Enter the digital universe</p>
</header>

<div class="container">
  <div class="games-grid">
    <a class="game-btn" href="games/game1.html">Game 1</a>
    <a class="game-btn" href="games/game2.html">Game 2</a>
    <a class="game-btn" href="games/game3.html">Game 3</a>
    <a class="game-btn" href="games/game4.html">Game 4</a>
    <a class="game-btn" href="games/game5.html">Game 5</a>
    <a class="game-btn" href="games/game6.html">Game 6</a>
  </div>
</div>

<footer>
  © 2026 Galaxy Game Hub • All Rights Reserved
</footer>

<script>
// Generate floating 0s and 1s
const binaryContainer = document.getElementById("binary");

for (let i = 0; i < 120; i++) {
  const span = document.createElement("span");
  span.innerText = Math.random() > 0.5 ? "0" : "1";
  span.style.left = Math.random() * 100 + "vw";
  span.style.animationDuration = (5 + Math.random() * 10) + "s";
  span.style.fontSize = (12 + Math.random() * 20) + "px";
  binaryContainer.appendChild(span);
}
</script>

</body>
</html>
