<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ff8c00, #ff5e00);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 40px 20px;
    color: white;
  }

  header h1 {
    font-size: 3rem;
    margin-bottom: 10px;
  }

  header p {
    font-size: 1.1rem;
    opacity: 0.9;
  }

  .container {
    flex: 1;
    background: #ffffff;
    padding: 40px;
    border-radius: 25px 25px 0 0;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
  }

  .game-btn {
    display: block;
    padding: 25px;
    background: linear-gradient(135deg, #ff7a00, #ff9500);
    color: white;
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: 600;
    text-align: center;
    border-radius: 15px;
    transition: 0.3s ease;
    box-shadow: 0 8px 18px rgba(0,0,0,0.15);
  }

  .game-btn:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.25);
  }

  footer {
    text-align: center;
    padding: 15px;
    font-size: 0.9rem;
    color: #666;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .games-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 600px) {
    .games-grid {
      grid-template-columns: 1fr;
    }
  }

</style>
</head>
<body>

<header>
  <h1>🎮 Game Hub</h1>
  <p>Select a game below to start playing</p>
</header>

<div class="container">
  <div class="games-grid">
    <a class="game-btn" href="games/game1.html">Game 1</a>
    <a class="game-btn" href="games/game2.html">Game 2</a>
    <a class="game-btn" href="games/game3.html">Game 3</a>
    <a class="game-btn" href="games/game4.html">Game 4</a>
    <a class="game-btn" href="games/game5.html">Game 5</a>
    <a class="game-btn" href="games/game6.html">Game 6</a>
  </div>
</div>

<footer>
  © 2026 Game Hub • All Rights Reserved
</footer>

</body>
</html>
