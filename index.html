<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 30%, #2a003f, #0a0014 60%);
  color: white;
  overflow-x: hidden;
}

/* Subtle animated stars */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.04;
  animation: moveStars 120s linear infinite;
  z-index: 0;
}

@keyframes moveStars {
  from { transform: translate(0,0); }
  to { transform: translate(-500px,-500px); }
}

header {
  text-align: center;
  padding: 50px 20px 30px;
  position: relative;
  z-index: 2;
}

header h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #c084fc, #9333ea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 25px rgba(147,51,234,0.6);
}

header p {
  opacity: 0.7;
  margin-top: 10px;
  font-size: 1rem;
}

/* Main container */
.container {
  width: 90%;
  margin: auto;
  padding: 40px 0;
  position: relative;
  z-index: 2;
}

/* 3-column grid */
.games-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 35px;
}

/* Fancy Game Card */
.game-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(192,132,252,0.3);
  transition: 0.4s ease;
  cursor: pointer;
}

.game-card:hover {
  transform: translateY(-12px) scale(1.03);
  box-shadow: 0 0 35px rgba(192,132,252,0.5);
}

/* Image Area */
.game-image {
  width: 100%;
  height: 180px;
  background-size: cover;
  background-position: center;
}

/* Info Section */
.game-info {
  padding: 20px;
}

.game-info h3 {
  font-size: 1.3rem;
  margin-bottom: 8px;
  color: #e9d5ff;
}

.game-info p {
  font-size: 0.9rem;
  opacity: 0.7;
  margin-bottom: 15px;
}

/* Fancy Play Button */
.play-btn {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 30px;
  background: linear-gradient(90deg, #9333ea, #c084fc);
  color: white;
  text-decoration: none;
  font-size: 0.9rem;
  transition: 0.3s;
}

.play-btn:hover {
  box-shadow: 0 0 15px #c084fc;
}

/* Responsive */
@media (max-width: 1000px) {
  .games-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .games-grid {
    grid-template-columns: 1fr;
  }
}

footer {
  text-align: center;
  padding: 30px;
  font-size: 0.8rem;
  opacity: 0.5;
}

</style>
